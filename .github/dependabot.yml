version: 2
updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Brussels
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /tests/selenium
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Brussels
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Brussels
    open-pull-requests-limit: 5
