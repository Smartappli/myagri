name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: PHP Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: dom, json, mbstring, pdo, pdo_mysql
          coverage: none

      - name: Validate Composer files
        run: composer validate --strict --no-check-publish

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Smoke tests
        run: composer smoke

      - name: Static analysis
        run: composer analyse

  selenium:
    name: Selenium Browser Tests
    runs-on: ubuntu-latest
    needs: quality

    services:
      selenium:
        image: selenium/standalone-chrome:latest
        ports:
          - 4444:4444
        options: >-
          --shm-size=2g
          --add-host=host.docker.internal:host-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: dom, json, mbstring, pdo, pdo_mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/selenium/requirements.txt

      - name: Install Selenium client
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tests/selenium/requirements.txt

      - name: Start PHP server
        run: |
          php -S 0.0.0.0:8087 -t . > php-server.log 2> php-server.err.log &
          echo $! > php-server.pid

      - name: Wait for services
        run: |
          for i in {1..45}; do
            if curl -fsS "http://127.0.0.1:8087/?lang=fr&page=accueil" > /dev/null; then
              break
            fi
            if [ "$i" -eq 45 ]; then
              cat php-server.err.log
              exit 1
            fi
            sleep 1
          done

          for i in {1..45}; do
            if curl -fsS "http://127.0.0.1:4444/status" > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Run Selenium tests
        env:
          BASE_URL: http://host.docker.internal:8087
          APP_HEALTH_URL: http://127.0.0.1:8087
          SELENIUM_REMOTE_URL: http://127.0.0.1:4444/wd/hub
        run: composer selenium

      - name: Upload PHP server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: php-server-logs
          path: |
            php-server.log
            php-server.err.log
          if-no-files-found: ignore
